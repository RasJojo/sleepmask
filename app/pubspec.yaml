name: sleepmask
description: "Sleepmask Pro — Private USDC payments on Base Sepolia"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Dynamic — embedded wallet (no MetaMask needed)
  dynamic_sdk: ^1.2.10

  # QR scanner
  mobile_scanner: ^7.2.0

  # HTTP REST calls to backend
  http: ^1.6.0

  # Secure local storage
  flutter_secure_storage: ^10.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
